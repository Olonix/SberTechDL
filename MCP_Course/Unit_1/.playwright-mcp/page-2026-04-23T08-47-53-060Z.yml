          - heading "Why Choose Inference Providers?" [level=2] [ref=e396]:
            - link [ref=e397] [cursor=pointer]:
              - /url: "#why-choose-inference-providers"
              - img [ref=e399]
            - text: Why Choose Inference Providers?
          - paragraph [ref=e401]: "When you build AI applications, it’s tough to manage multiple provider APIs, comparing model performance, and dealing with varying reliability. Inference Providers solves these challenges by offering:"
          - paragraph [ref=e402]:
            - strong [ref=e403]: Instant Access to Cutting-Edge Models
            - text: ": Go beyond mainstream providers to access thousands of specialized models across multiple AI tasks. Whether you need the latest language models, state-of-the-art image generators, or domain-specific embeddings, you’ll find them here."
          - paragraph [ref=e404]:
            - strong [ref=e405]: Zero Vendor Lock-in
            - text: ": Unlike being tied to a single provider’s model catalog, you get access to models from Cerebras, Groq, Together AI, Replicate, and more — all through one consistent interface."
          - paragraph [ref=e406]:
            - strong [ref=e407]: Production-Ready Performance
            - text: ": Built for enterprise workloads with the reliability your applications demand."
          - paragraph [ref=e408]: "Here’s what you can build:"
          - list [ref=e409]:
            - listitem [ref=e410]:
              - strong [ref=e411]: Text Generation
              - text: ": Use Large language models with tool-calling capabilities for chatbots, content generation, and code assistance"
            - listitem [ref=e412]:
              - strong [ref=e413]: Image and Video Generation
              - text: ": Create custom images and videos, including support for LoRAs and style customization"
            - listitem [ref=e414]:
              - strong [ref=e415]: Search & Retrieval
              - text: ": State-of-the-art embeddings for semantic search, RAG systems, and recommendation engines"
            - listitem [ref=e416]:
              - strong [ref=e417]: Traditional ML Tasks
              - text: ": Ready-to-use models for classification, NER, summarization, and speech recognition"
          - paragraph [ref=e418]:
            - text: ⚡
            - strong [ref=e419]: Get Started for Free
            - text: ": Inference Providers includes a generous free tier, with additional credits for"
            - link "PRO users" [ref=e420] [cursor=pointer]:
              - /url: https://hf.co/subscribe/pro
            - text: and
            - link "Team & Enterprise organizations" [ref=e421] [cursor=pointer]:
              - /url: https://huggingface.co/enterprise
            - text: .
          - heading "Key Features" [level=2] [ref=e422]:
            - link [ref=e423] [cursor=pointer]:
              - /url: "#key-features"
              - img [ref=e425]
            - text: Key Features
          - list [ref=e427]:
            - listitem [ref=e428]:
              - strong [ref=e429]: 🎯 All-in-One API
              - text: ": A single API for text generation, image generation, document embeddings, NER, summarization, image classification, and more."
            - listitem [ref=e430]:
              - strong [ref=e431]: 🔀 Multi-Provider Support
              - text: ": Easily run models from top-tier providers like fal, Replicate, Sambanova, Together AI, and others."
            - listitem [ref=e432]:
              - strong [ref=e433]: 🚀 Scalable & Reliable
              - text: ": Built for high availability and low-latency performance in production environments."
            - listitem [ref=e434]:
              - strong [ref=e435]: 🔧 Developer-Friendly
              - text: ": Simple requests, fast responses, and a consistent developer experience across Python and JavaScript clients."
            - listitem [ref=e436]:
              - strong [ref=e437]: 👷 Easy to integrate
