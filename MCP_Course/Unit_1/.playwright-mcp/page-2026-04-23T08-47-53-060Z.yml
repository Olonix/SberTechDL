          - paragraph [ref=e672]:
            - text: By default, the fastest available provider is selected for the model (highest throughput in tokens per second). This is equivalent to appending
            - code [ref=e673]: :fastest
            - text: "to the model name. You can change that policy by adding a suffix to the model name:"
          - list [ref=e674]:
