          - heading "Provider Selection" [level=2] [ref=e617]:
            - link [ref=e618] [cursor=pointer]:
              - /url: "#provider-selection"
              - img [ref=e620]
            - text: Provider Selection
          - paragraph [ref=e622]: The Inference Providers API acts as a unified proxy layer that sits between your application and multiple AI providers. Understanding how provider selection works is crucial for optimizing performance, cost, and reliability in your applications.
          - heading "API as a Proxy Service" [level=3] [ref=e623]:
            - link [ref=e624] [cursor=pointer]:
              - /url: "#api-as-a-proxy-service"
              - img [ref=e626]
            - text: API as a Proxy Service
          - paragraph [ref=e628]: "When using Inference Providers, your requests go through Hugging Face’s proxy infrastructure, which provides several key benefits:"
          - list [ref=e629]:
            - listitem [ref=e630]:
              - strong [ref=e631]: Unified Authentication & Billing
              - text: ": Use a single Hugging Face token for all providers"
            - listitem [ref=e632]:
              - strong [ref=e633]: Automatic Failover
              - text: ": When using automatic provider selection ("
              - code [ref=e634]: provider="auto"
              - text: ), requests are automatically routed to alternative providers if the primary provider is flagged as unavailable by our validation system
            - listitem [ref=e635]:
              - strong [ref=e636]: Consistent Interface through client libraries
              - text: ": When using our client libraries, the same request format works across different providers"
          - paragraph [ref=e637]:
            - text: Because the API acts as a proxy, the exact HTTP request may vary between providers as each provider has their own API requirements and response formats.
            - strong [ref=e638]: When using our official client libraries
            - text: (JavaScript or Python), these provider-specific differences are handled automatically whether you use
            - code [ref=e639]: provider="auto"
            - text: or specify a particular provider.
          - heading "Client-Side Provider Selection (Inference Clients)" [level=3] [ref=e640]:
            - link [ref=e641] [cursor=pointer]:
              - /url: "#client-side-provider-selection-inference-clients"
              - img [ref=e643]
            - text: Client-Side Provider Selection (Inference Clients)
          - paragraph [ref=e645]: When using the Hugging Face inference clients (JavaScript or Python), you can explicitly specify a provider or let the system choose automatically. The client then formats the HTTP request to match the selected provider’s API requirements.
